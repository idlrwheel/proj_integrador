<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-menu">
            <img src="/frontend/assets/logo.png" alt="Logo da Loja" class="logo">
        </div>
        <div class="top-bar">
            <a href="index.html" class="voltar">Voltar</a>
        </div>
    </header>
    <section class="detalhes-produto">
        <div class="produto-container">
            <img id="imagem-produto" class="produto-imagem" alt="Imagem do Produto">
            <div class="produto-info">
                <h1 id="nome-produto"></h1>
                <p id="avaliacao-produto"></p>
                <p id="preco-produto"></p>
                <p id="estoque-produto"></p>
                <p id="descricao-produto"></p>
            </div>
        </div>
    </section>
    <script src="js/detalhes.js"></script> <!-- Script separado -->
</body>
</html>
